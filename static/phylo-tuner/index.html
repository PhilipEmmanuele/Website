<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phylogenetic 10D Tuner — Evo 2 Tree of Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0c0a;
      --surface: #161410;
      --surface2: #1e1c17;
      --accent: #c8904a;
      --text: #f0e8db;
      --text-muted: #8a7d6e;
      --border: #2c2720;
      --gold: #e8b450;
      --radius: 6px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* ── Plot ── */
    .plot-wrap {
      position: relative;
      width: 100%;
      height: 580px;
    }

    #three-container {
      width: 100%;
      height: 100%;
    }

    /* ── Overlays (shared) ── */
    .overlay {
      position: absolute;
      background: rgba(13, 12, 10, 0.86);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* Search — top left */
    .overlay-tl { top: 12px; left: 12px; min-width: 210px; max-width: 270px; }

    .search-row {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      gap: 4px;
    }

    #species-search {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }

    #species-search::placeholder { color: var(--text-muted); }

    #species-dropdown-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 0 3px;
      line-height: 1;
      transition: color 0.15s;
      flex-shrink: 0;
      user-select: none;
    }

    #species-dropdown-btn:hover { color: var(--text); }

    #species-list-wrap { border-top: 1px solid var(--border); padding: 4px; }
    #species-list-wrap.hidden { display: none; }

    #species-select {
      width: 100%;
      height: 150px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.78rem;
      outline: none;
      padding: 2px;
    }

    #species-select option { background: var(--surface2); padding: 3px 6px; }
    #species-select option:checked { background: var(--accent); }

    /* Results — top right */
    .overlay-tr { top: 12px; right: 12px; width: 240px; padding: 10px 12px; }

    .results-label {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .species-card {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 8px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(22, 20, 16, 0.5);
      margin-bottom: 5px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .species-card:last-child { margin-bottom: 0; }
    .species-card:hover { border-color: var(--accent); background: rgba(40, 32, 20, 0.75); }
    .species-card.top1 { border-color: var(--gold); background: rgba(35, 28, 12, 0.65); }

    .rank-badge {
      font-size: 0.62rem;
      font-weight: 700;
      width: 17px; height: 17px;
      border-radius: 50%;
      background: var(--border);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .top1 .rank-badge { background: var(--gold); color: #111; }
    .species-info { flex: 1; min-width: 0; }

    .species-name {
      font-size: 0.76rem;
      font-weight: 600;
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top1 .species-name { color: var(--gold); }

    .species-sim-row {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 4px;
    }

    .species-sim-bar {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .species-sim-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
    }

    .top1 .species-sim-fill { background: var(--gold); }

    .species-sim-pct {
      font-size: 0.61rem;
      color: var(--text-muted);
      font-family: monospace;
      flex-shrink: 0;
      min-width: 36px;
      text-align: right;
    }

    .species-taxon {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.25s ease, margin-top 0.15s ease;
      margin-top: 0;
    }

    .species-taxon.open {
      max-height: 160px;
      margin-top: 6px;
    }

    .taxon-row {
      display: flex;
      gap: 6px;
      line-height: 1.6;
    }

    .taxon-rank {
      color: var(--text-muted);
      opacity: 0.55;
      flex-shrink: 0;
      width: 42px;
      text-transform: uppercase;
      font-size: 0.55rem;
      letter-spacing: 0.05em;
      padding-top: 1px;
    }

    .taxon-val {
      font-size: 0.63rem;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expand-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.6rem;
      padding: 2px 2px;
      line-height: 1;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 3px;
      transition: color 0.15s, transform 0.2s;
    }

    .expand-btn:hover { color: var(--text); }
    .expand-btn.open { transform: rotate(90deg); }

    /* Legend — bottom right */
    .overlay-br {
      bottom: 12px; right: 12px;
      padding: 8px 12px;
      max-height: 160px;
      overflow-y: auto;
      max-width: 180px;
    }

    .overlay-br::-webkit-scrollbar { width: 3px; }
    .overlay-br::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .legend h4 {
      font-size: 0.63rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .legend-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* Plot hint */
    #plot-hint {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 0.68rem;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      opacity: 0.55;
      pointer-events: none;
      font-family: "Space Grotesk", sans-serif;
    }

    /* ── Sliders ── */
    .sliders-section {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px 20px;
    }

    .sliders-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px 24px;
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .slider-name { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); }
    .slider-val  { font-size: 0.72rem; font-family: monospace; color: var(--accent); }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px; height: 13px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .reset-btn {
      display: block;
      margin: 0 auto;
      padding: 7px 22px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Loading + tooltip ── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; gap: 16px;
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 0.9rem; }

    #tooltip {
      position: fixed;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.78rem;
      pointer-events: none;
      z-index: 50;
      max-width: 240px;
      display: none;
      line-height: 1.6;
    }

    #tooltip .t-name { font-style: italic; font-weight: 600; color: var(--accent); }
    #tooltip .t-row { color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading species data…</div>
  </div>

  <div id="tooltip"></div>

  <div id="app">

    <div class="plot-wrap" id="plot-panel">
      <div id="three-container"></div>

      <!-- Search — top left -->
      <div class="overlay overlay-tl" id="search-overlay">
        <div class="search-row">
          <input type="text" id="species-search" placeholder="Search species…" autocomplete="off">
          <button id="species-dropdown-btn" title="Browse all species">▾</button>
        </div>
        <div id="species-list-wrap" class="hidden">
          <select id="species-select" size="8"></select>
        </div>
      </div>

      <!-- Nearest species — top right -->
      <div class="overlay overlay-tr">
        <div class="results-label">5 Nearest Species</div>
        <div id="results-list"></div>
      </div>

      <!-- Legend — bottom right -->
      <div class="overlay overlay-br" id="legend"></div>

      <!-- Hint — bottom left -->
      <div id="plot-hint">Drag to rotate &middot; Scroll to zoom &middot; Click dot to snap sliders</div>
    </div>

    <div class="sliders-section">
      <div id="sliders-container" class="sliders-grid"></div>
      <button class="reset-btn" id="reset-btn">Reset sliders to mean</button>
    </div>

  </div>

  <script>
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Data
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let DATA = null, PROJ3D = null, currentVec = null;

    async function loadData() {
      try {
        setLoading("Loading species data…");
        const r1 = await fetch("data/species_10d.json");
        if (!r1.ok) throw new Error(`species_10d.json: HTTP ${r1.status}`);
        DATA = await r1.json();
        if (!DATA?.coords || !DATA?.taxonomy) throw new Error("species_10d.json: unexpected structure");

        setLoading("Loading 3D projection…");
        const r2 = await fetch("data/projection_3d.json");
        if (!r2.ok) throw new Error(`projection_3d.json: HTTP ${r2.status}`);
        PROJ3D = await r2.json();
        if (!PROJ3D?.x) throw new Error("projection_3d.json: unexpected structure");

        setLoading("Initializing…");
        await new Promise(r => requestAnimationFrame(r));
        init();
        document.getElementById("loading").classList.add("hidden");
      } catch (err) {
        document.getElementById("loading-text").textContent = "Error: " + err.message;
        document.getElementById("loading-text").style.color = "#ff6b6b";
        console.error(err);
      }
    }

    function setLoading(msg) { document.getElementById("loading-text").textContent = msg; }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Colors
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const PALETTE = [
      "#4f7cff","#7c4fff","#ff6b6b","#ffd166","#06d6a0",
      "#ef9d1e","#a8dadc","#e63946","#2ec4b6","#ff9f1c",
      "#bc6c25","#606c38","#dda15e","#a7c957","#6a0572",
      "#4cc9f0","#f72585","#3a86ff","#8338ec","#ffbe0b",
      "#fb5607","#ff006e","#8ecae6","#219ebc","#023047",
      "#d62828","#457b9d","#1d3557","#a8c5da","#b5838d",
    ];
    let classColorMap = {}, classOrder = [];

    function assignColors(taxonomy) {
      const cnt = {};
      for (const t of taxonomy) { const c = t.class || "Unknown"; cnt[c] = (cnt[c] || 0) + 1; }
      classOrder = Object.entries(cnt).sort((a,b) => b[1]-a[1]).map(([c]) => c);
      classOrder.forEach((c, i) => { classColorMap[c] = PALETTE[i % PALETTE.length]; });
    }

    function colorForSpecies(i) { return classColorMap[DATA.taxonomy[i].class || "Unknown"] || "#888"; }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Init
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function init() {
      assignColors(DATA.taxonomy);
      buildSliders();
      buildSpeciesSelector();
      buildLegend();
      initThree();
      currentVec = [...DATA.dim_mean];
      setSliderValues(currentVec);
      update();
      notifyParentHeight();
      // resize listener registered inside initThree()
    }

    function notifyParentHeight() {
      if (window.parent === window) return;
      const plotH    = document.querySelector(".plot-wrap").offsetHeight;
      const slidersH = document.querySelector(".sliders-section").offsetHeight;
      window.parent.postMessage({ type: "phylo-tuner-resize", height: plotH + slidersH + 2 }, "*");
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Sliders
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    const sliders = [];

    function buildSliders() {
      const container = document.getElementById("sliders-container");
      container.innerHTML = "";
      for (let d = 0; d < 10; d++) {
        const mn = DATA.dim_min[d], mx = DATA.dim_max[d];
        const row = document.createElement("div");
        row.className = "slider-row";
        row.innerHTML = `
          <div class="slider-label">
            <span class="slider-name">Dim ${d + 1}</span>
            <span class="slider-val" id="val-${d}">0.000</span>
          </div>
          <input type="range" id="slider-${d}" min="${mn}" max="${mx}"
                 step="${(mx - mn) / 500}" value="${DATA.dim_mean[d]}">
        `;
        container.appendChild(row);
        const input = row.querySelector("input");
        input.addEventListener("input", () => {
          currentVec[d] = parseFloat(input.value);
          document.getElementById(`val-${d}`).textContent = currentVec[d].toFixed(3);
          update();
        });
        sliders.push(input);
      }
      document.getElementById("reset-btn").addEventListener("click", () => {
        currentVec = [...DATA.dim_mean];
        setSliderValues(currentVec);
        update();
      });
    }

    function setSliderValues(vec) {
      for (let d = 0; d < 10; d++) {
        sliders[d].value = vec[d];
        document.getElementById(`val-${d}`).textContent = vec[d].toFixed(3);
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Species selector
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let allSpeciesOptions = [];

    function buildSpeciesSelector() {
      const sel      = document.getElementById("species-select");
      const search   = document.getElementById("species-search");
      const listWrap = document.getElementById("species-list-wrap");
      const dropBtn  = document.getElementById("species-dropdown-btn");

      allSpeciesOptions = DATA.taxonomy
        .map((t, i) => ({ label: t.species || DATA.species_ids[i], idx: i }))
        .sort((a, b) => a.label.localeCompare(b.label));

      function renderOptions(filter) {
        sel.innerHTML = "";
        const q = filter.toLowerCase();
        const shown = q ? allSpeciesOptions.filter(o => o.label.toLowerCase().includes(q)) : allSpeciesOptions;
        for (const o of shown) {
          const opt = document.createElement("option");
          opt.value = o.idx; opt.textContent = o.label;
          opt.style.color = colorForSpecies(o.idx);
          sel.appendChild(opt);
        }
      }
      renderOptions("");

      let manuallyOpened = false;
      const showList = () => listWrap.classList.remove("hidden");
      const hideList = () => { listWrap.classList.add("hidden"); manuallyOpened = false; };
      const isVisible = () => !listWrap.classList.contains("hidden");

      search.addEventListener("input", () => {
        renderOptions(search.value);
        search.value.length > 0 ? showList() : (!manuallyOpened && hideList());
      });

      dropBtn.addEventListener("click", e => {
        e.stopPropagation();
        if (isVisible()) { hideList(); } else { manuallyOpened = true; renderOptions(search.value); showList(); }
      });

      sel.addEventListener("change", () => {
        const idx = parseInt(sel.value, 10);
        if (isNaN(idx)) return;
        currentVec = [...DATA.coords[idx]];
        setSliderValues(currentVec);
        update();
        search.value = ""; renderOptions(""); hideList();
      });

      document.addEventListener("click", e => {
        if (!document.getElementById("search-overlay").contains(e.target) && isVisible()) {
          search.value = ""; renderOptions(""); hideList();
        }
      });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Legend
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function buildLegend() {
      const legend = document.getElementById("legend");
      legend.innerHTML = "<h4>Taxonomic Class</h4>";
      for (const cls of classOrder.slice(0, 20)) {
        const item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = `<div class="legend-dot" style="background:${classColorMap[cls]}"></div>
                          <span title="${cls}">${cls || "Unknown"}</span>`;
        legend.appendChild(item);
      }
      if (classOrder.length > 20) {
        const more = document.createElement("div");
        more.style.cssText = "color:var(--text-muted);font-size:0.65rem;margin-top:3px;";
        more.textContent = `+${classOrder.length - 20} more`;
        legend.appendChild(more);
      }
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // KNN search (cosine distance)
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function cosineDistTo(vec) {
      const coords = DATA.coords, N = coords.length, D = vec.length;
      let qnorm = 0;
      for (let d = 0; d < D; d++) qnorm += vec[d] * vec[d];
      qnorm = Math.sqrt(qnorm) || 1e-9;
      const results = new Array(N);
      for (let i = 0; i < N; i++) {
        const ci = coords[i];
        let dot = 0, cnorm = 0;
        for (let d = 0; d < D; d++) { dot += vec[d]*ci[d]; cnorm += ci[d]*ci[d]; }
        results[i] = { idx: i, dist: 1 - dot / (qnorm * (Math.sqrt(cnorm) || 1e-9)) };
      }
      results.sort((a, b) => a.dist - b.dist);
      return results;
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Results overlay
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let expandedIdx = -1;
    let currentTop5 = [];

    function refreshResults() {
      updateResults(currentTop5);
    }

    function updateResults(top5) {
      const list = document.getElementById("results-list");
      list.innerHTML = "";
      top5.forEach(({ idx, dist }, rank) => {
        const t = DATA.taxonomy[idx];
        const name = t.species || DATA.species_ids[idx];
        const simPct = Math.max(0, (1 - dist) * 100);
        const simLabel = simPct.toFixed(1) + "%";
        const isOpen = idx === expandedIdx;

        const RANKS = ['domain','phylum','class','order','family','genus'];
        const taxonHtml = RANKS
          .filter(r => t[r])
          .map(r => `<div class="taxon-row"><span class="taxon-rank">${r}</span><span class="taxon-val">${t[r]}</span></div>`)
          .join('');

        const card = document.createElement("div");
        card.className = "species-card" + (rank === 0 ? " top1" : "");
        card.innerHTML = `
          <div class="rank-badge">${rank + 1}</div>
          <div class="species-info">
            <div class="species-name" style="color:${colorForSpecies(idx)}" title="${name}">${name}</div>
            <div class="species-sim-row">
              <div class="species-sim-bar"><div class="species-sim-fill" style="width:${simPct.toFixed(1)}%"></div></div>
              <div class="species-sim-pct">${simLabel}</div>
            </div>
            <div class="species-taxon${isOpen ? ' open' : ''}">${taxonHtml || "—"}</div>
          </div>
          <button class="expand-btn${isOpen ? ' open' : ''}" title="Show phylogeny">&#9658;</button>`;

        card.querySelector(".expand-btn").addEventListener("click", e => {
          e.stopPropagation();
          expandedIdx = (expandedIdx === idx) ? -1 : idx;
          refreshResults();
        });

        card.addEventListener("click", () => {
          currentVec = [...DATA.coords[idx]];
          setSliderValues(currentVec);
          update();
        });

        list.appendChild(card);
      });
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Three.js 3D scatter plot
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    let threeRenderer, threeScene, threeCamera, threeControls;
    let threePoints;         // THREE.Points — all species dots
    let markerMesh;          // white sphere — current slider position
    let highlightMesh;       // gold sphere  — nearest species
    let scatterPositions;    // Float32Array [N*3] for updateHighlight lookups
    let scatterScale;        // {cx,cy,cz,scale} normalisation
    const _mouseNDC = new THREE.Vector2(0, 0); // cursor in NDC, updated on mousemove

    const POINT_SIZE    = 4.0;
    const MARKER_RADIUS = 0.018;   // base radius — scaled by camera distance each frame

    function initThree() {
      const container = document.getElementById("three-container");
      const W = container.clientWidth, H = container.clientHeight;

      threeRenderer = new THREE.WebGLRenderer({ antialias: true });
      threeRenderer.setPixelRatio(window.devicePixelRatio);
      threeRenderer.setSize(W, H);
      threeRenderer.setClearColor(0x0d0c0a);
      container.appendChild(threeRenderer.domElement);

      threeScene  = new THREE.Scene();
      threeCamera = new THREE.PerspectiveCamera(45, W / H, 0.01, 100);
      threeCamera.position.set(0, 0, 3);

      threeControls = new THREE.OrbitControls(threeCamera, threeRenderer.domElement);
      threeControls.enableDamping = true;
      threeControls.dampingFactor = 0.08;
      threeControls.minDistance   = 0.5;
      threeControls.maxDistance   = 10;
      threeControls.enableZoom    = false; // handled manually for cursor-targeted zoom

      threeRenderer.domElement.addEventListener("wheel", onThreeWheel, { passive: false });

      buildPointCloud();

      // White sphere — current slider position
      markerMesh = new THREE.Mesh(
        new THREE.SphereGeometry(MARKER_RADIUS, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })
      );
      markerMesh.renderOrder = 2;
      threeScene.add(markerMesh);

      // Gold sphere — nearest species
      highlightMesh = new THREE.Mesh(
        new THREE.SphereGeometry(MARKER_RADIUS * 1.4, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0xffd166, depthTest: false })
      );
      highlightMesh.renderOrder = 1;
      highlightMesh.visible = false;
      threeScene.add(highlightMesh);

      window.addEventListener("resize", () => { onThreeResize(); notifyParentHeight(); });
      threeRenderer.domElement.addEventListener("mousemove", onThreeMouseMove);
      threeRenderer.domElement.addEventListener("click",     onThreeClick);

      animate();
    }

    function buildPointCloud() {
      const px = PROJ3D.x, py = PROJ3D.y, pz = PROJ3D.z;
      const N  = px.length;

      let xmn=Infinity, xmx=-Infinity, ymn=Infinity, ymx=-Infinity, zmn=Infinity, zmx=-Infinity;
      for (let i=0;i<N;i++) {
        if(px[i]<xmn) xmn=px[i]; if(px[i]>xmx) xmx=px[i];
        if(py[i]<ymn) ymn=py[i]; if(py[i]>ymx) ymx=py[i];
        if(pz[i]<zmn) zmn=pz[i]; if(pz[i]>zmx) zmx=pz[i];
      }
      const cx = (xmn+xmx)/2, cy = (ymn+ymx)/2, cz = (zmn+zmx)/2;
      const scale = 2 / Math.max(xmx-xmn, ymx-ymn, zmx-zmn, 1e-9);
      scatterScale = { cx, cy, cz, scale };

      const positions = new Float32Array(N * 3);
      const colors    = new Float32Array(N * 3);
      const tmp = new THREE.Color();

      for (let i = 0; i < N; i++) {
        positions[i*3  ] = (px[i] - cx) * scale;
        positions[i*3+1] = (py[i] - cy) * scale;
        positions[i*3+2] = (pz[i] - cz) * scale;
        tmp.set(colorForSpecies(i));
        colors[i*3  ] = tmp.r;
        colors[i*3+1] = tmp.g;
        colors[i*3+2] = tmp.b;
      }
      scatterPositions = positions;

      const geo = new THREE.BufferGeometry();
      geo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geo.setAttribute("color",    new THREE.BufferAttribute(colors,    3));

      threePoints = new THREE.Points(geo, new THREE.PointsMaterial({
        size:            POINT_SIZE,
        sizeAttenuation: false,
        vertexColors:    true,
        transparent:     true,
        opacity:         0.75,
      }));
      threeScene.add(threePoints);
    }

    function projectToScene(vec10d) {
      const mean = PROJ3D.pca_mean, comps = PROJ3D.pca_components;
      const pc = [0, 0, 0];
      for (let c = 0; c < 3; c++)
        for (let d = 0; d < 10; d++)
          pc[c] += (vec10d[d] - mean[d]) * comps[c][d];
      const { cx, cy, cz, scale } = scatterScale;
      return {
        x: (pc[0] - cx) * scale,
        y: (pc[1] - cy) * scale,
        z: (pc[2] - cz) * scale,
      };
    }

    function updateMarker() {
      if (!markerMesh || !currentVec || !scatterScale) return;
      const { x, y, z } = projectToScene(currentVec);
      markerMesh.position.set(x, y, z);
    }

    function updateHighlight(speciesIdx) {
      if (!highlightMesh || !scatterPositions) return;
      if (speciesIdx < 0) { highlightMesh.visible = false; return; }
      highlightMesh.position.set(
        scatterPositions[speciesIdx*3  ],
        scatterPositions[speciesIdx*3+1],
        scatterPositions[speciesIdx*3+2],
      );
      highlightMesh.visible = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      threeControls.update();

      // Scale markers proportionally to camera distance so they stay
      // visually consistent at any zoom level.  dist/3 = 1 at the default
      // camera position (z=3), so the geometry radius is used as-is there.
      if (markerMesh && highlightMesh) {
        const s = threeCamera.position.length() / 3.0;
        markerMesh.scale.setScalar(s);
        highlightMesh.scale.setScalar(s);
      }

      threeRenderer.render(threeScene, threeCamera);
    }

    function onThreeResize() {
      const container = document.getElementById("three-container");
      const W = container.clientWidth, H = container.clientHeight;
      threeCamera.aspect = W / H;
      threeCamera.updateProjectionMatrix();
      threeRenderer.setSize(W, H);
    }

    // Screen-space hit detection for hover & click.
    // Projects each point to pixels and finds the nearest one within HIT_RADIUS.
    // This matches exactly what you see regardless of camera distance.
    const HIT_RADIUS = 6; // pixels
    const _proj = new THREE.Vector3();
    let hoveredIdx = -1;

    function getClosestScreenPoint(clientX, clientY) {
      const rect = threeRenderer.domElement.getBoundingClientRect();
      const mx = clientX - rect.left;
      const my = clientY - rect.top;
      const W = rect.width, H = rect.height;
      const N = scatterPositions.length / 3;
      const maxD2 = HIT_RADIUS * HIT_RADIUS;
      // Among all points within HIT_RADIUS px, pick the one with the smallest
      // NDC z (closest to camera) — that's the one visually on top.
      let bestIdx = -1, bestZ = Infinity;
      for (let i = 0; i < N; i++) {
        _proj.set(scatterPositions[i*3], scatterPositions[i*3+1], scatterPositions[i*3+2]);
        _proj.project(threeCamera);
        if (_proj.z > 1) continue; // behind camera
        const sx = (_proj.x + 1) / 2 * W;
        const sy = (1 - _proj.y) / 2 * H;
        const d2 = (sx - mx) ** 2 + (sy - my) ** 2;
        if (d2 < maxD2 && _proj.z < bestZ) { bestZ = _proj.z; bestIdx = i; }
      }
      return bestIdx;
    }

    function onThreeMouseMove(e) {
      const rect = threeRenderer.domElement.getBoundingClientRect();
      _mouseNDC.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
      _mouseNDC.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;

      hoveredIdx = getClosestScreenPoint(e.clientX, e.clientY);
      const tip = document.getElementById("tooltip");
      if (hoveredIdx >= 0) {
        const t    = DATA.taxonomy[hoveredIdx];
        const name = t.species || DATA.species_ids[hoveredIdx];
        tip.style.display = "block";
        tip.style.left    = (e.clientX + 14) + "px";
        tip.style.top     = (e.clientY - 10) + "px";
        tip.innerHTML = `
          <div class="t-name" style="color:${colorForSpecies(hoveredIdx)}">${name}</div>
          <div class="t-row">Class: ${t.class  || "—"}</div>
          <div class="t-row">Order: ${t.order  || "—"}</div>
          <div class="t-row">Family: ${t.family || "—"}</div>`;
        threeRenderer.domElement.style.cursor = "pointer";
      } else {
        tip.style.display = "none";
        threeRenderer.domElement.style.cursor = "";
      }
    }

    const _zoomRay = new THREE.Raycaster();
    const _zoomVec = new THREE.Vector3();

    function onThreeWheel(e) {
      e.preventDefault();

      const distToTarget = threeCamera.position.distanceTo(threeControls.target);

      // Cast ray through cursor and move camera along it — zooms in the direction
      // the cursor is pointing rather than straight toward the origin.
      // Target is never moved so orbit/pan always revolves around the data centre.
      _zoomRay.setFromCamera(_mouseNDC, threeCamera);
      const moveAmount = distToTarget * 0.04;
      const sign = e.deltaY > 0 ? -1 : 1; // scroll up = zoom in
      threeCamera.position.addScaledVector(_zoomRay.ray.direction, sign * moveAmount);

      // Clamp camera distance from orbit target
      const newDist = threeCamera.position.distanceTo(threeControls.target);
      if (newDist < threeControls.minDistance || newDist > threeControls.maxDistance) {
        const clamped = Math.max(threeControls.minDistance, Math.min(threeControls.maxDistance, newDist));
        const axis = threeCamera.position.clone().sub(threeControls.target).normalize();
        threeCamera.position.copy(threeControls.target).addScaledVector(axis, clamped);
      }

      threeControls.update();
    }

    function onThreeClick(e) {
      if (hoveredIdx < 0) return;
      currentVec = [...DATA.coords[hoveredIdx]];
      setSliderValues(currentVec);
      update();
    }

    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    // Main update
    // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    function update() {
      const ranked = cosineDistTo(currentVec);
      currentTop5 = ranked.slice(0, 5);
      updateResults(currentTop5);
      updateMarker();
      updateHighlight(ranked[0].idx);
    }

    loadData();
  </script>
</body>
</html>
